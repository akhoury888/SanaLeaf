<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SanaLeaf — Find the Plant That Fits Your Life</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..600&family=Outfit:wght@300;400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --forest:#1B4332;
  --forest-deep:#0F2A1F;
  --sage:#95D5B2;
  --sage-soft:#C7E8D5;
  --ivory:#F8F9FA;
  --ivory-warm:#F4F2EC;
  --gold:#D4A373;
  --gold-deep:#B8853F;
  --ink:#1A2620;
  --paper:#FBFAF6;
  --line:rgba(27,67,50,0.12);
  --shadow:0 24px 60px -28px rgba(15,42,31,0.45);
  --shadow-sm:0 8px 24px -14px rgba(15,42,31,0.4);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Outfit',sans-serif;
  background:var(--paper);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
::selection{background:var(--sage);color:var(--forest-deep)}
img{display:block;max-width:100%}
button{font-family:inherit;cursor:pointer;border:none;background:none}
a{color:inherit;text-decoration:none}

.serif{font-family:'Fraunces',serif}
.mono{font-family:'Spline Sans Mono',monospace}

/* ---------- type scale ---------- */
.eyebrow{
  font-family:'Spline Sans Mono',monospace;
  font-size:.72rem;letter-spacing:.32em;text-transform:uppercase;
  color:var(--gold-deep);font-weight:500;
}
h1,h2,h3{font-family:'Fraunces',serif;font-weight:400;line-height:1.04;letter-spacing:-.01em}

/* ---------- buttons ---------- */
.btn{
  display:inline-flex;align-items:center;gap:.6rem;
  padding:.95rem 1.9rem;border-radius:100px;
  font-size:.92rem;font-weight:500;letter-spacing:.01em;
  transition:transform .35s cubic-bezier(.2,.8,.2,1),box-shadow .35s,background .3s,color .3s;
  will-change:transform;
}
.btn:hover{transform:translateY(-2px)}
.btn:focus-visible{outline:2px solid var(--gold);outline-offset:3px}
.btn-primary{background:var(--forest);color:var(--ivory);box-shadow:var(--shadow-sm)}
.btn-primary:hover{background:var(--forest-deep)}
.btn-gold{background:var(--gold);color:var(--forest-deep);box-shadow:0 10px 30px -12px rgba(212,163,115,.8)}
.btn-gold:hover{background:var(--gold-deep);color:#fff}
.btn-ghost{background:rgba(248,249,250,.1);color:var(--ivory);border:1px solid rgba(248,249,250,.4);backdrop-filter:blur(6px)}
.btn-ghost:hover{background:rgba(248,249,250,.18)}
.btn-outline{border:1px solid var(--line);color:var(--forest)}
.btn-outline:hover{background:var(--forest);color:var(--ivory);border-color:var(--forest)}

.wrap{max-width:1200px;margin:0 auto;padding:0 28px}
.section{padding:120px 0}
@media(max-width:720px){.section{padding:80px 0}}

/* ---------- nav ---------- */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 28px;transition:.4s;
}
.nav.solid{background:rgba(251,250,246,.86);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.nav-logo{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:500;letter-spacing:-.02em;color:var(--forest);display:flex;align-items:center;gap:.5rem}
.nav-logo .leaf{width:26px;height:26px}
.nav-links{display:flex;gap:34px;align-items:center}
.nav-links a{font-size:.9rem;font-weight:400;color:var(--ink);position:relative;transition:.3s;opacity:.8}
.nav-links a:hover{opacity:1}
.nav-links a::after{content:"";position:absolute;left:0;bottom:-5px;width:0;height:1.5px;background:var(--gold);transition:.3s}
.nav-links a:hover::after{width:100%}
.nav.on-dark .nav-logo,.nav.on-dark .nav-links a{color:var(--ivory)}
.nav.on-dark.solid .nav-logo,.nav.on-dark.solid .nav-links a{color:var(--ink)}
.nav.on-dark.solid .nav-logo{color:var(--forest)}
.nav-cta{padding:.6rem 1.3rem;font-size:.85rem;border-radius:100px;background:var(--forest);color:var(--ivory);transition:.3s}
.nav-cta:hover{background:var(--forest-deep)}
.burger{display:none;flex-direction:column;gap:5px;padding:8px}
.burger span{width:22px;height:2px;background:var(--ink);transition:.3s}
.nav.on-dark .burger span{background:var(--ivory)}
.nav.on-dark.solid .burger span{background:var(--ink)}
@media(max-width:860px){
  .nav-links{display:none}
  .burger{display:flex}
}
.mobile-menu{
  position:fixed;inset:0;z-index:199;background:var(--forest-deep);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;
  opacity:0;pointer-events:none;transition:.4s;
}
.mobile-menu.open{opacity:1;pointer-events:auto}
.mobile-menu a{font-family:'Fraunces',serif;font-size:2rem;color:var(--ivory)}

/* ---------- hero ---------- */
.hero{position:relative;min-height:100vh;display:flex;align-items:flex-end;overflow:hidden;background:var(--forest-deep)}
.hero-bg{position:absolute;inset:0;z-index:0}
.hero-bg::before{
  content:"";position:absolute;inset:0;z-index:2;
  background:linear-gradient(180deg,rgba(15,42,31,.55) 0%,rgba(15,42,31,.2) 35%,rgba(15,42,31,.85) 100%);
}
.hero-leaves{position:absolute;inset:0;z-index:1;opacity:.5}
.hero-content{position:relative;z-index:3;padding-bottom:9vh;width:100%}
.hero h1{
  font-size:clamp(3rem,9vw,7.2rem);color:var(--ivory);font-weight:300;
  max-width:14ch;letter-spacing:-.03em;
}
.hero h1 em{font-style:italic;color:var(--sage)}
.hero-sub{color:rgba(248,249,250,.82);font-size:clamp(1rem,1.5vw,1.22rem);max-width:46ch;margin:28px 0 38px;line-height:1.6;font-weight:300}
.hero-actions{display:flex;gap:16px;flex-wrap:wrap}
.hero-scroll{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);z-index:3;color:rgba(248,249,250,.6);font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;display:flex;flex-direction:column;align-items:center;gap:10px;font-family:'Spline Sans Mono',monospace}
.hero-scroll .dot{width:1px;height:36px;background:linear-gradient(var(--sage),transparent);animation:scrolldot 2s infinite}
@keyframes scrolldot{0%{opacity:0;transform:scaleY(0);transform-origin:top}50%{opacity:1;transform:scaleY(1)}100%{opacity:0;transform:scaleY(1);transform-origin:bottom}}

.fade-up{opacity:0;transform:translateY(30px);transition:opacity 1s cubic-bezier(.2,.8,.2,1),transform 1s cubic-bezier(.2,.8,.2,1)}
.fade-up.in{opacity:1;transform:none}

/* ---------- how it works ---------- */
.steps{display:grid;grid-template-columns:repeat(4,1fr);gap:30px;margin-top:60px}
@media(max-width:860px){.steps{grid-template-columns:repeat(2,1fr)}}
@media(max-width:520px){.steps{grid-template-columns:1fr}}
.step{position:relative;padding-top:28px;border-top:1px solid var(--line)}
.step-num{font-family:'Spline Sans Mono',monospace;font-size:.8rem;color:var(--gold-deep);letter-spacing:.2em}
.step h3{font-size:1.5rem;margin:14px 0 10px;color:var(--forest)}
.step p{font-size:.95rem;color:#5a6b62;line-height:1.6}

.sec-head{max-width:60ch}
.sec-head h2{font-size:clamp(2.2rem,5vw,3.6rem);color:var(--forest);margin:18px 0;font-weight:300}
.sec-head h2 em{font-style:italic;color:var(--gold-deep)}
.sec-head p{color:#5a6b62;font-size:1.08rem;line-height:1.65;max-width:52ch}
.center{text-align:center;margin-left:auto;margin-right:auto}
.center p{margin-left:auto;margin-right:auto}

/* ---------- plant cards ---------- */
.plants-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;margin-top:60px}
@media(max-width:960px){.plants-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:520px){.plants-grid{grid-template-columns:1fr}}
.pcard{background:#fff;border-radius:20px;overflow:hidden;box-shadow:var(--shadow-sm);transition:transform .5s cubic-bezier(.2,.8,.2,1),box-shadow .5s;cursor:pointer;border:1px solid var(--line)}
.pcard:hover{transform:translateY(-8px);box-shadow:var(--shadow)}
.pcard-img{aspect-ratio:1/1.08;overflow:hidden;position:relative;background:var(--ivory-warm)}
.pcard-img img{width:100%;height:100%;object-fit:cover;transition:transform 1s cubic-bezier(.2,.8,.2,1)}
.pcard:hover .pcard-img img{transform:scale(1.06)}
.pcard-tag{position:absolute;top:14px;left:14px;background:rgba(251,250,246,.9);backdrop-filter:blur(4px);font-family:'Spline Sans Mono',monospace;font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;padding:6px 12px;border-radius:100px;color:var(--forest)}
.pcard-body{padding:22px}
.pcard-body .epi{font-family:'Spline Sans Mono',monospace;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-deep)}
.pcard-body h3{font-size:1.4rem;color:var(--forest);margin:8px 0 4px}
.pcard-body .sci{font-style:italic;font-size:.9rem;color:#7a8a80;font-family:'Fraunces',serif}
.pcard-meta{display:flex;gap:16px;margin-top:16px;padding-top:16px;border-top:1px solid var(--line);font-size:.78rem;color:#5a6b62}
.pcard-meta span{display:flex;flex-direction:column;gap:2px}
.pcard-meta b{font-family:'Spline Sans Mono',monospace;font-size:.7rem;letter-spacing:.1em;color:var(--gold-deep);text-transform:uppercase;font-weight:500}

/* ---------- quiz ---------- */
.quiz-stage{min-height:100vh;background:var(--forest-deep);display:flex;align-items:center;justify-content:center;padding:90px 20px 40px;position:relative;overflow:hidden}
.quiz-leaves{position:absolute;inset:0;opacity:.18;z-index:0}
.quiz-card{position:relative;z-index:2;max-width:680px;width:100%}
.quiz-progress{display:flex;align-items:center;gap:14px;margin-bottom:40px}
.quiz-bar{flex:1;height:3px;background:rgba(248,249,250,.16);border-radius:100px;overflow:hidden}
.quiz-bar-fill{height:100%;background:var(--sage);border-radius:100px;transition:width .6s cubic-bezier(.2,.8,.2,1)}
.quiz-count{font-family:'Spline Sans Mono',monospace;font-size:.78rem;color:var(--sage);letter-spacing:.1em}
.quiz-q{font-family:'Fraunces',serif;font-size:clamp(1.8rem,4.5vw,2.9rem);color:var(--ivory);font-weight:300;line-height:1.1;margin-bottom:40px;letter-spacing:-.02em}
.quiz-opts{display:flex;flex-direction:column;gap:14px}
.quiz-opt{
  display:flex;align-items:center;gap:18px;text-align:left;
  padding:20px 24px;border-radius:16px;
  background:rgba(248,249,250,.05);border:1px solid rgba(248,249,250,.14);
  color:var(--ivory);font-size:1.05rem;transition:.3s;
}
.quiz-opt:hover{background:rgba(149,213,178,.14);border-color:var(--sage);transform:translateX(6px)}
.quiz-opt .key{font-family:'Spline Sans Mono',monospace;width:30px;height:30px;border-radius:50%;border:1px solid rgba(248,249,250,.3);display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;transition:.3s}
.quiz-opt:hover .key{background:var(--sage);color:var(--forest-deep);border-color:var(--sage)}
.quiz-back{margin-top:30px;color:rgba(248,249,250,.5);font-size:.85rem;font-family:'Spline Sans Mono',monospace;letter-spacing:.05em;transition:.3s}
.quiz-back:hover{color:var(--sage)}
.quiz-intro{text-align:center;max-width:620px;position:relative;z-index:2}
.quiz-intro h2{font-size:clamp(2.4rem,6vw,4.2rem);color:var(--ivory);font-weight:300;margin:20px 0}
.quiz-intro h2 em{font-style:italic;color:var(--sage)}
.quiz-intro p{color:rgba(248,249,250,.7);font-size:1.1rem;line-height:1.6;margin-bottom:36px}

/* ---------- reveal ---------- */
.reveal-stage{min-height:100vh;background:radial-gradient(120% 100% at 50% 0%,#163a2b 0%,var(--forest-deep) 70%);display:flex;align-items:center;justify-content:center;padding:90px 20px;color:var(--ivory);position:relative;overflow:hidden}
.reveal-loading{text-align:center;position:relative;z-index:2}
.reveal-loading .orb{width:90px;height:90px;margin:0 auto 30px;border-radius:50%;border:2px solid rgba(149,213,178,.25);border-top-color:var(--sage);animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.reveal-loading .ld-text{font-family:'Spline Sans Mono',monospace;letter-spacing:.2em;text-transform:uppercase;font-size:.8rem;color:var(--sage)}
.reveal-loading h2{font-family:'Fraunces',serif;font-size:clamp(1.6rem,4vw,2.4rem);font-weight:300;margin-top:14px;color:var(--ivory)}

.reveal-content{max-width:1080px;width:100%;position:relative;z-index:2}
.reveal-pre{text-align:center;margin-bottom:50px}
.reveal-pre .eyebrow{color:var(--sage)}
.reveal-pre h2{font-size:clamp(2rem,5vw,3.6rem);font-weight:300;color:var(--ivory);max-width:20ch;margin:16px auto 0;line-height:1.12}
.reveal-pre h2 em{font-style:italic;color:var(--sage)}
.reveal-main{display:grid;grid-template-columns:1fr 1.1fr;gap:50px;align-items:center}
@media(max-width:860px){.reveal-main{grid-template-columns:1fr;gap:36px}}
.reveal-photo{position:relative;border-radius:24px;overflow:hidden;box-shadow:0 40px 80px -30px rgba(0,0,0,.6);aspect-ratio:4/5}
.reveal-photo img{width:100%;height:100%;object-fit:cover}
.reveal-score{position:absolute;top:18px;right:18px;background:rgba(15,42,31,.7);backdrop-filter:blur(8px);border:1px solid rgba(149,213,178,.3);border-radius:16px;padding:14px 18px;text-align:center}
.reveal-score .num{font-family:'Fraunces',serif;font-size:2rem;color:var(--sage);line-height:1}
.reveal-score .lbl{font-family:'Spline Sans Mono',monospace;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(248,249,250,.7);margin-top:4px}
.reveal-info .epi{font-family:'Spline Sans Mono',monospace;font-size:.74rem;letter-spacing:.24em;text-transform:uppercase;color:var(--gold)}
.reveal-info h3{font-size:clamp(2.4rem,5vw,3.4rem);color:var(--ivory);font-weight:300;margin:10px 0 6px}
.reveal-info .sci{font-family:'Fraunces',serif;font-style:italic;font-size:1.15rem;color:var(--sage);margin-bottom:24px}
.reveal-story{color:rgba(248,249,250,.8);line-height:1.75;font-size:1.05rem;font-weight:300;border-left:2px solid var(--gold);padding-left:22px;margin-bottom:28px}
.reveal-origin{display:flex;align-items:center;gap:12px;font-family:'Spline Sans Mono',monospace;font-size:.8rem;letter-spacing:.08em;color:var(--sage);margin-bottom:30px}
.reveal-actions{display:flex;gap:14px;flex-wrap:wrap}

/* ---------- product page ---------- */
.pp{padding-top:100px}
.pp-hero{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:start}
@media(max-width:860px){.pp-hero{grid-template-columns:1fr;gap:36px}}
.pp-photo{border-radius:24px;overflow:hidden;box-shadow:var(--shadow);position:sticky;top:110px;aspect-ratio:4/5;background:var(--ivory-warm)}
.pp-photo img{width:100%;height:100%;object-fit:cover}
.pp-info .epi{font-family:'Spline Sans Mono',monospace;font-size:.74rem;letter-spacing:.24em;text-transform:uppercase;color:var(--gold-deep)}
.pp-info h1{font-size:clamp(2.6rem,6vw,4rem);color:var(--forest);font-weight:300;margin:12px 0 6px}
.pp-info .sci{font-family:'Fraunces',serif;font-style:italic;font-size:1.2rem;color:#7a8a80;margin-bottom:24px}
.pp-price{font-family:'Fraunces',serif;font-size:2rem;color:var(--forest);margin:24px 0}
.pp-price small{font-size:.9rem;color:#7a8a80;font-family:'Outfit';font-style:normal}
.pp-story{color:#46554c;line-height:1.8;font-size:1.05rem;font-weight:300;margin:24px 0}
.pp-traits{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin:28px 0}
.trait{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px}
.trait b{font-family:'Spline Sans Mono',monospace;font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-deep);display:block;margin-bottom:6px}
.trait span{font-size:.98rem;color:var(--forest)}
.ratings{display:flex;gap:30px;margin:24px 0}
.rating .dots{display:flex;gap:5px;margin-top:6px}
.rating .dots i{width:9px;height:9px;border-radius:50%;background:var(--line)}
.rating .dots i.on{background:var(--gold)}
.rating b{font-family:'Spline Sans Mono',monospace;font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:#7a8a80}

.box-section{background:var(--forest);color:var(--ivory);border-radius:24px;padding:44px;margin-top:50px}
.box-section h3{font-size:1.8rem;font-weight:300;margin-bottom:8px;color:var(--ivory)}
.box-section p.sub{color:rgba(248,249,250,.6);margin-bottom:28px;font-size:.95rem}
.box-list{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
@media(max-width:720px){.box-list{grid-template-columns:1fr}}
.box-item{display:flex;gap:12px;align-items:flex-start;padding:16px;border:1px solid rgba(248,249,250,.14);border-radius:14px}
.box-item .ck{color:var(--sage);flex-shrink:0;margin-top:2px}
.box-item b{display:block;font-size:.98rem;font-weight:500;margin-bottom:3px}
.box-item span{font-size:.84rem;color:rgba(248,249,250,.6);line-height:1.5}

/* ---------- passport ---------- */
.passport{background:linear-gradient(160deg,#14342580,#0f2a1f);border:1px solid rgba(149,213,178,.25);border-radius:20px;overflow:hidden;max-width:520px;box-shadow:var(--shadow)}
.passport-head{background:var(--forest-deep);padding:22px 26px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px dashed rgba(149,213,178,.3)}
.passport-head .pt{font-family:'Spline Sans Mono',monospace;font-size:.66rem;letter-spacing:.24em;text-transform:uppercase;color:var(--sage)}
.passport-head .pn{font-family:'Spline Sans Mono',monospace;font-size:.7rem;color:rgba(248,249,250,.5)}
.passport-body{padding:26px}
.passport-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(248,249,250,.08)}
.passport-row .k{font-family:'Spline Sans Mono',monospace;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(149,213,178,.7)}
.passport-row .v{font-size:.92rem;color:var(--ivory);text-align:right;font-family:'Fraunces',serif}
.passport-stamp{position:absolute;font-family:'Spline Sans Mono',monospace;color:var(--gold);border:2px solid var(--gold);border-radius:8px;padding:6px 12px;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;transform:rotate(-12deg);opacity:.7}
.passport-qr{margin-top:18px;display:flex;gap:16px;align-items:center;padding-top:18px;border-top:1px dashed rgba(149,213,178,.3)}
.qr-box{width:64px;height:64px;background:#fff;border-radius:8px;padding:6px;flex-shrink:0}

/* ---------- stories / testimonials ---------- */
.stories-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:54px}
@media(max-width:860px){.stories-grid{grid-template-columns:1fr}}
.story-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:30px;transition:.4s}
.story-card:hover{box-shadow:var(--shadow-sm);transform:translateY(-4px)}
.story-quote{font-family:'Fraunces',serif;font-style:italic;font-size:1.15rem;color:var(--forest);line-height:1.5;margin-bottom:22px}
.story-by{display:flex;align-items:center;gap:12px}
.story-av{width:42px;height:42px;border-radius:50%;background:var(--sage-soft);display:flex;align-items:center;justify-content:center;font-family:'Fraunces';color:var(--forest);font-size:1.1rem}
.story-by b{display:block;font-size:.92rem;color:var(--ink)}
.story-by span{font-size:.78rem;color:#7a8a80;font-family:'Spline Sans Mono';letter-spacing:.05em}

/* ---------- origin map ---------- */
.origin-section{background:var(--forest-deep);color:var(--ivory);border-radius:28px;padding:56px;position:relative;overflow:hidden}
.origin-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:50px;align-items:center;position:relative;z-index:2}
@media(max-width:860px){.origin-grid{grid-template-columns:1fr}}
.origin-section h2{font-size:clamp(2rem,4.5vw,3.2rem);font-weight:300;color:var(--ivory);margin:16px 0}
.origin-section h2 em{font-style:italic;color:var(--sage)}
.origin-section p{color:rgba(248,249,250,.72);line-height:1.7;font-weight:300}
.map-frame{aspect-ratio:1/1;border-radius:18px;border:1px solid rgba(149,213,178,.25);background:radial-gradient(circle at 60% 40%,#1d4a37,#0f2a1f);position:relative;overflow:hidden}
.map-pin{position:absolute;width:14px;height:14px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 0 rgba(212,163,115,.7);animation:pulse 2.4s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(212,163,115,.6)}70%{box-shadow:0 0 0 22px rgba(212,163,115,0)}100%{box-shadow:0 0 0 0 rgba(212,163,115,0)}}

/* ---------- blog ---------- */
.blog-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:26px;margin-top:50px}
@media(max-width:860px){.blog-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.blog-grid{grid-template-columns:1fr}}
.blog-card{cursor:pointer;transition:.4s}
.blog-card:hover{transform:translateY(-5px)}
.blog-thumb{aspect-ratio:16/11;border-radius:16px;overflow:hidden;margin-bottom:18px;position:relative}
.blog-thumb img{width:100%;height:100%;object-fit:cover;transition:transform 1s}
.blog-card:hover .blog-thumb img{transform:scale(1.06)}
.blog-cat{font-family:'Spline Sans Mono',monospace;font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-deep)}
.blog-card h3{font-size:1.3rem;color:var(--forest);font-weight:400;margin:8px 0;line-height:1.2}
.blog-card p{font-size:.92rem;color:#5a6b62;line-height:1.6}
.blog-card .rt{font-family:'Spline Sans Mono';font-size:.74rem;color:#9aa89f;margin-top:10px}
.cat-pills{display:flex;gap:10px;flex-wrap:wrap;margin-top:30px}
.cat-pill{padding:.5rem 1.1rem;border-radius:100px;border:1px solid var(--line);font-size:.82rem;color:var(--forest);transition:.3s}
.cat-pill:hover,.cat-pill.active{background:var(--forest);color:var(--ivory);border-color:var(--forest)}

/* ---------- newsletter ---------- */
.news{background:var(--forest);border-radius:28px;padding:60px;text-align:center;color:var(--ivory);position:relative;overflow:hidden}
.news h2{font-size:clamp(2rem,4.5vw,3.2rem);font-weight:300;color:var(--ivory);margin-bottom:14px}
.news h2 em{font-style:italic;color:var(--sage)}
.news p{color:rgba(248,249,250,.7);max-width:46ch;margin:0 auto 30px;line-height:1.6}
.news-form{display:flex;gap:12px;max-width:480px;margin:0 auto;flex-wrap:wrap;justify-content:center}
.news-form input{flex:1;min-width:220px;padding:1rem 1.4rem;border-radius:100px;border:1px solid rgba(248,249,250,.3);background:rgba(248,249,250,.08);color:var(--ivory);font-family:inherit;font-size:.95rem}
.news-form input::placeholder{color:rgba(248,249,250,.5)}
.news-form input:focus{outline:none;border-color:var(--sage)}

/* ---------- footer ---------- */
.footer{background:var(--forest-deep);color:var(--ivory);padding:70px 0 36px}
.footer-grid{display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr;gap:40px;margin-bottom:50px}
@media(max-width:760px){.footer-grid{grid-template-columns:1fr 1fr}}
.footer-logo{font-family:'Fraunces',serif;font-size:1.7rem;color:var(--ivory);margin-bottom:14px;display:flex;align-items:center;gap:.5rem}
.footer-col p{color:rgba(248,249,250,.55);font-size:.9rem;line-height:1.7;max-width:32ch}
.footer-col h4{font-family:'Spline Sans Mono';font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--sage);margin-bottom:18px}
.footer-col a{display:block;color:rgba(248,249,250,.6);font-size:.9rem;margin-bottom:11px;transition:.3s}
.footer-col a:hover{color:var(--sage)}
.footer-bottom{border-top:1px solid rgba(248,249,250,.1);padding-top:26px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:14px;font-size:.82rem;color:rgba(248,249,250,.45);font-family:'Spline Sans Mono'}

/* ---------- account / admin shared ---------- */
.panel{background:#fff;border:1px solid var(--line);border-radius:18px;padding:28px;box-shadow:var(--shadow-sm)}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:30px;border-bottom:1px solid var(--line);padding-bottom:0}
.tab{padding:.7rem 1.2rem;font-size:.9rem;color:#7a8a80;border-bottom:2px solid transparent;transition:.3s;margin-bottom:-1px}
.tab.active{color:var(--forest);border-bottom-color:var(--gold)}
.tab:hover{color:var(--forest)}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:30px}
@media(max-width:760px){.kpis{grid-template-columns:repeat(2,1fr)}}
.kpi{background:#fff;border:1px solid var(--line);border-radius:16px;padding:22px}
.kpi .v{font-family:'Fraunces';font-size:2rem;color:var(--forest);line-height:1}
.kpi .l{font-family:'Spline Sans Mono';font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:#7a8a80;margin-top:8px}
.kpi .d{font-size:.78rem;margin-top:8px;color:var(--gold-deep)}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-family:'Spline Sans Mono';font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:#7a8a80;padding:12px;border-bottom:1px solid var(--line)}
td{padding:14px 12px;border-bottom:1px solid var(--line);font-size:.9rem;color:var(--ink)}
.badge{font-family:'Spline Sans Mono';font-size:.66rem;letter-spacing:.08em;padding:4px 10px;border-radius:100px;text-transform:uppercase}
.badge.green{background:var(--sage-soft);color:var(--forest)}
.badge.gold{background:#f3e3cf;color:var(--gold-deep)}
.badge.grey{background:#eceef0;color:#7a8a80}
.bar-chart{display:flex;align-items:flex-end;gap:14px;height:180px;margin-top:20px;padding:0 4px}
.bar-chart .bar{flex:1;background:linear-gradient(var(--sage),var(--forest));border-radius:8px 8px 0 0;position:relative;transition:.5s;min-height:8px}
.bar-chart .bar span{position:absolute;bottom:-24px;left:0;right:0;text-align:center;font-family:'Spline Sans Mono';font-size:.64rem;color:#7a8a80}

.modal-back{position:fixed;inset:0;background:rgba(15,42,31,.6);backdrop-filter:blur(6px);z-index:300;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:.3s}
.modal-back.open{opacity:1;pointer-events:auto}
.modal{background:var(--paper);border-radius:22px;max-width:760px;width:100%;max-height:88vh;overflow:auto;box-shadow:var(--shadow);position:relative}
.modal-close{position:absolute;top:16px;right:16px;width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,.05);display:flex;align-items:center;justify-content:center;z-index:5}
.modal-close:hover{background:rgba(0,0,0,.1)}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--forest-deep);color:var(--ivory);padding:14px 26px;border-radius:100px;font-size:.9rem;z-index:400;opacity:0;transition:.4s;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.gift-tag{display:inline-flex;align-items:center;gap:8px;background:#f3e3cf;color:var(--gold-deep);padding:.5rem 1rem;border-radius:100px;font-size:.82rem;font-family:'Spline Sans Mono';letter-spacing:.04em;margin-top:18px}

.reveal-photo,.fade-up,.pcard{will-change:transform}
@media(prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
  .fade-up{opacity:1;transform:none}
}
.divider{height:1px;background:var(--line);margin:0 auto;max-width:1200px}
</style>

   opts:[{t:"Small apartment",p:{haworthia:3,hoyacarnosa:1}},{t:"Modern condo",p:{hoyacarnosa:3}},{t:"House with many plants",p:{aglaonema:3}},{t:"Dedicated plant room",p:{hoyaghost:4}}]},
  {q:"What attracts you most?",
   opts:[{t:"Simplicity",p:{haworthia:3}},{t:"Unusual appearance",p:{hoyacarnosa:3}},{t:"Rarity",p:{hoyaghost:4}},{t:"Artistic beauty",p:{aglaonema:4}}]}
];
function scoreQuiz(answers){
  const tally={haworthia:0,hoyacarnosa:0,aglaonema:0,hoyaghost:0};
  answers.forEach((ai,qi)=>{const pts=QUESTIONS[qi].opts[ai].p;for(const k in pts)tally[k]+=pts[k];});
  let max=0,maxPossible=0;
  QUESTIONS.forEach(q=>{let qm=0;q.opts.forEach(o=>{const v=Object.values(o.p).reduce((a,b)=>Math.max(a,b),0);qm=Math.max(qm,v);});maxPossible+=qm;});
  let winner="haworthia";for(const k in tally){if(tally[k]>max){max=tally[k];winner=k;}}
  const compat=Math.round(78+ (max/maxPossible)*20); // 78-98 range, always feels high
  return {winner,compat:Math.min(compat,99),tally};
}

function useReveal(){
  useEffect(()=>{
    const els=document.querySelectorAll('.fade-up');
    const io=new IntersectionObserver((es)=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}});},{threshold:.12});
    els.forEach(el=>io.observe(el));
    return ()=>io.disconnect();
  });
}

        <div className="quiz-count">{String(step+1).padStart(2,"0")} / {String(QUESTIONS.length).padStart(2,"0")}</div>

      <div className="quiz-q" key={step}>{Q.q}</div>
      <div className="quiz-opts">
        {Q.opts.map((o,i)=>(

function Reveal({result,go,toast}){
  const [phase,setPhase]=useState("load"); // load -> pre -> show

  useEffect(()=>{
    const t1=setTimeout(()=>setPhase("pre"),2600);
    const t2=setTimeout(()=>setPhase("show"),4600);
    return ()=>{clearTimeout(t1);clearTimeout(t2);};
  },[]);
  const loadMsgs=["Reading your light","Weighing your habits","Tracing your character","Crossing the world"];
  const [li,setLi]=useState(0);
  useEffect(()=>{if(phase!=="load")return;const iv=setInterval(()=>setLi(v=>(v+1)%loadMsgs.length),650);return ()=>clearInterval(iv);},[phase]);

  if(phase==="load"){
    return (<section className="reveal-stage">
      <div className="reveal-loading">
        <div className="orb"/>
        <div className="ld-text">{loadMsgs[li]}…</div>
        <h2>Your match is being found</h2>

/* ============ ROOT APP ============ */
function App(){
  const [route,setRoute]=useState({name:"home",param:null});
  const [result,setResult]=useState(null);
  const [toastMsg,setToastMsg]=useState("");
  const tRef=useRef();
  const go=(name,param=null)=>{setRoute({name,param});window.scrollTo({top:0,behavior:"instant"});};
  const toast=(m)=>{setToastMsg(m);clearTimeout(tRef.current);tRef.current=setTimeout(()=>setToastMsg(""),2800);};
  const darkRoutes=["home","quiz","reveal"];
  const onDark=darkRoutes.includes(route.name);
  let view;
  switch(route.name){
    case "quiz": view=<Quiz go={go} setResult={setResult}/>;break;
    case "reveal": view=<Reveal result={result} go={go} toast={toast}/>;break;
    case "product": view=<Product id={route.param} go={go} toast={toast}/>;break;
    case "plants": view=<Home go={go} toast={toast}/>;break;
    case "stories": view=<Home go={go} toast={toast}/>;break;
    case "blog": view=<Blog go={go}/>;break;
    case "account": view=<Account go={go}/>;break;
    case "admin": view=<Admin/>;break;
    default: view=<Home go={go} toast={toast}/>;
  }
  // anchor scroll for plants/stories
  useEffect(()=>{
    if(route.name==="plants"||route.name==="stories"){
      setTimeout(()=>{const el=document.getElementById(route.name);if(el)el.scrollIntoView({behavior:"smooth"});},100);
    }
  },[route]);
  const showChrome=route.name!=="quiz"&&route.name!=="reveal";
  return (<>
    <Nav go={go} onDark={onDark}/>
    {view}
    {showChrome && <Footer go={go}/>}
    <Toast msg={toastMsg}/>
  </>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
